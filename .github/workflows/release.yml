name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/**'

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Determine bump
        id: bump
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format="%s")
          else
            COMMITS=$(git log "$LAST_TAG..HEAD" --format="%s")
          fi
          if echo "$COMMITS" | grep -q "BREAKING CHANGE"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -q "^feat"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version
        id: version
        run: |
          VERSION_FILE="VERSION"
          if [ -f "pyproject.toml" ]; then
            CURRENT=$(python -c "import re; print(re.search(r'version\s*=\s*[\"']([^\"']+)[\"']', open('pyproject.toml').read()).group(1))" 2>/dev/null || echo "0.0.0")
          elif [ -f "$VERSION_FILE" ]; then
            CURRENT=$(grep -oP '^version=\K[0-9]+\.[0-9]+\.[0-9]+' "$VERSION_FILE" || echo "0.0.0")
          else
            CURRENT="0.0.0"
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          if [ -f "pyproject.toml" ]; then
            sed -i "s/version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" pyproject.toml
          else
            echo "version=$NEW_VERSION" > "$VERSION_FILE"
          fi

      - name: Install dependencies
        run: pip install pytest

      - name: Lint
        run: python -m py_compile osdlc.py src/osdlc/*.py

      - name: Run tests
        id: tests
        continue-on-error: true
        run: python -m pytest -v || test $? -eq 5

      - name: Build
        run: python -m py_compile osdlc.py src/osdlc/*.py

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Release tests failed',
              body: 'Tests failed during release for version ${{ steps.version.outputs.new_version }}. Check the release workflow run for details.',
              labels: ['bug', 'auto-reported']
            })

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          VERSION_FILE="VERSION"
          [ -f "pyproject.toml" ] && VERSION_FILE="pyproject.toml"
          git add "$VERSION_FILE"
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag v${{ steps.version.outputs.new_version }}

      - name: Push changes
        run: |
          git push origin main
          git push origin v${{ steps.version.outputs.new_version }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          make_latest: true
