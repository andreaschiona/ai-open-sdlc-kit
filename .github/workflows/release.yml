name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
      - '.github/**'

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Bump version
        id: version
        shell: bash
        run: |
          OUTPUT=$(python -m osdlc.version update --root . 2>&1)
          echo "update_output=$OUTPUT" >> "$GITHUB_OUTPUT"
          NEW_VERSION=$(echo "$OUTPUT" | grep -oP '-> \K[0-9]+\.[0-9]+\.[0-9]+')
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT"

      - name: Install dependencies
        run: pip install pytest

      - name: Lint
        run: python -m py_compile osdlc.py src/osdlc/*.py

      - name: Run tests
        id: tests
        continue-on-error: true
        run: python -m pytest -v || test $? -eq 5

      - name: Build
        run: python -m py_compile osdlc.py src/osdlc/*.py

      - name: Create issue on test failure
        if: steps.tests.outcome == 'failure'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Release tests failed',
              body: 'Tests failed during release for version ${{ steps.version.outputs.new_version }}. Check the release workflow run for details.',
              labels: ['bug', 'auto-reported']
            })

      - name: Fail if tests failed
        if: steps.tests.outcome == 'failure'
        run: exit 1

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          VERSION_FILE=$(python -m osdlc.version detect --root . | cut -d' ' -f1)
          [ -z "$VERSION_FILE" ] && VERSION_FILE="VERSION"
          git add "$VERSION_FILE"
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
          git tag v${{ steps.version.outputs.new_version }}

      - name: Push changes
        run: |
          git push origin main
          git push origin v${{ steps.version.outputs.new_version }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          generate_release_notes: true
          make_latest: true
