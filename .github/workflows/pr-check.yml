name: PR Check

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pytest

      - name: Lint
        run: python -m py_compile src/osdlc/*.py osdlc.py

      - name: Test
        run: python -m pytest -v || test $? -eq 5

      - name: Build
        run: python -m py_compile src/osdlc/*.py osdlc.py
